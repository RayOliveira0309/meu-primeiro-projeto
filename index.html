<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Projeto QA</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: center;
      width: 300px;
      animation: aparecer 0.8s ease;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #333;
      font-weight: 600;
    }

    p {
      color: #777;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    input:focus {
      outline: none;
      border: 1px solid #4CAF50;
      box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    #mensagem {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Simulador de Testes QA 🧪</h1>

    <p>Digite um nome para validar cenários de teste</p>

    <input type="text" id="nome" placeholder="Digite seu nome" onkeydown="verificarEnter(event)">

    <button onclick="testar()">Testar</button>
    <button onclick="limpar()">Limpar</button>

    <p id="mensagem"></p>

  </div>

  <script>
    function testar() {
      let nome = document.getElementById("nome").value;
      let mensagem = document.getElementById("mensagem");

      if (nome === "") {
        mensagem.innerText = "❌ Teste falhou: campo vazio";
      } else if (nome.length < 3) {
        mensagem.innerText = "⚠️ Nome muito curto";
      } else if (nome.length > 20) {
        mensagem.innerText = "⚠️ Nome muito longo";
      } else {
        mensagem.innerText = "✅ Teste passou";
      }
    }

    function limpar() {
      document.getElementById("mensagem").innerText = "";
      document.getElementById("nome").value = "";
    }

    function verificarEnter(event) {
      if (event.key === "Enter") {
        testar();
      }
    }
  </script>

</body>
</html>
