<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Primeiro Projeto</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


  <style>
  body {
  font-family: 'Poppins', sans-serif;
  background-color: #f4f4f4;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
  margin: 0;
}

.container {
  background-color: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.1);

  display: flex;            
  flex-direction: column;   
  gap: 20px;                  

  text-align: center;
  width: 300px;
}
}

h1 {
  color: #333;
  margin-bottom: 10px;
  font-weight:600 
}

p {
  color: #777;
  font-size 14px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
input:focus {
  outline: none;
  border: 1px solid #4CAF50;
  box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
}

button {
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 5px;
  background: linear-gradient(135deg, #4CAF50, #2e7d32);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:active {
  transform: scale(0.98);
}
#mensagem {
  margin-top: 15px;
  font-weight: bold;
}

button:hover {
  transform: scale(1.03);
}  

  </style>
</head>

<body>

  <div class="container">

    <h1>Olá, eu sou a Rayanne 👩‍💻</h1>

    <p>Estou começando minha jornada no Front-End e QA 🚀</p>

    <input type="text" id="nome" placeholder="Digite seu nome" onkeydown="verificarEnter(event)">

    <button onclick="mostrarMensagem()">Clique aqui</button>
    <button onclick="limparMensagem()">Limpar</button>

    <p id="mensagem"></p>

  </div>

</body>

  <script>
    function mostrarMensagem() {
  let nome = document.getElementById("nome").value;

  if (nome === "") {
    document.getElementById("mensagem").innerText = "Digite seu nome primeiro!";
  } else {
    document.getElementById("mensagem").innerText = "Olá, " + nome + "! Bem-vindo ao meu projeto 🚀";
  }
}
    function limparMensagem() {
        document.getElementById("mensagem").innerText = "";
        document.getElementById("nome").value = "";
    
    }

    function verificarEnter(event) {
  if (event.key === "Enter") {
    mostrarMensagem();
  }
}
  </script>

</body>
</html>
